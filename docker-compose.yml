version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: jarvis_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./server
    container_name: jarvis_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/jarvis
      - JWT_SECRET=supersecretjarviskey1234
      - AI_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma4
    depends_on:
      - mongodb
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: .
    container_name: jarvis_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
