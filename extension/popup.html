<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>J.A.R.V.I.S Popup</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      background-color: #07090F;
      color: #fff;
    }
    h3 {
      margin-top: 0;
      text-align: center;
      color: #00d2ff;
    }
    .btn {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #3a7bd5, #00d2ff);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      background-image: none;
      margin-top: 5px;
    }
    .input-box {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #00d2ff;
      border-radius: 4px;
      color: #fff;
      box-sizing: border-box;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .header-bar h3 {
      margin: 0;
      color: #00d2ff;
    }
    .settings-btn {
      background: none;
      border: none;
      color: #8b9bb4;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.3s;
    }
    .settings-btn:hover {
      color: #fff;
    }
    .settings-area {
      display: none;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .settings-area.show {
      display: block;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .api-status {
      font-size: 11px;
      margin-bottom: 5px;
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <h3>J.A.R.V.I.S Core</h3>
    <button class="settings-btn" id="btn-toggle-settings" title="Settings">⚙️</button>
  </div>
  
  <p style="font-size: 13px; text-align: center; color: #94a3b8; margin-bottom: 16px; margin-top: 5px;">
    Select text on the page to analyze.
  </p>

  <button class="btn" id="btn-summarize">Summarize Selection</button>
  <button class="btn" id="btn-explain">Explain Selection</button>
  <button class="btn" id="btn-rewrite">Rewrite Selection</button>

  <div class="response-area" id="response-box">
    Awaiting input...
  </div>

  <div class="settings-area" id="settings-area">
    <div style="font-size: 12px; margin-bottom: 5px;">Settings (BYOK)</div>
    <div id="api-status" class="api-status">API Key: Not Set</div>
    <input type="password" id="api-key-input" class="input-box" placeholder="Enter Gemini API Key..." />
    <button class="btn btn-secondary" id="btn-save-key">Save Key</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
